<style id="codeblock-hover-copy-style">
  .codeblock-hover-copy {
    position: relative;
    cursor: copy;
  }
  .codeblock-hover-copy::before {
    content: attr(data-hint);
    position: absolute;
    left: 50%;
    bottom: 100%;
    transform: translateX(-50%);
    margin-bottom: 6px;
    padding: 4px 10px;
    font-size: 12px;
    line-height: 1.4;
    white-space: nowrap;
    color: #fff;
    background: rgba(0, 0, 0, 0.78);
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 20;
  }
  .codeblock-hover-copy:hover::before,
  .codeblock-hover-copy.is-flash::before {
    opacity: 1;
  }
  .codeblock-hover-copy.is-flash::before {
    content: attr(data-done);
  }
</style>
<script>
(function () {
  function getCode(fig) {
    var lines = fig.querySelectorAll('.code .line');
    if (lines.length) {
      return Array.prototype.map.call(lines, function (n) { return n.innerText; }).join('\n');
    }
    var pre = fig.querySelector('pre');
    return pre ? pre.textContent : '';
  }

  function copyText(text, ok, fail) {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(ok).catch(function () { fallback(); });
      return;
    }
    fallback();

    function fallback() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy') ? ok() : fail();
      } catch (e) {
        fail();
      }
      document.body.removeChild(ta);
    }
  }

  function bind(fig) {
    if (!fig || fig.dataset.hoverCopyBound) return;
    fig.dataset.hoverCopyBound = '1';
    fig.classList.add('codeblock-hover-copy');
    fig.setAttribute('data-hint', '左键点击代码即可复制');
    fig.setAttribute('data-done', '已复制到剪贴板');

    fig.addEventListener('click', function (e) {
      var text = getCode(fig);
      if (!text) return;
      e.preventDefault();

      copyText(
        text,
        function () {
          fig.classList.add('is-flash');
          window.clearTimeout(fig._copyFlashTimer);
          fig._copyFlashTimer = window.setTimeout(function () {
            fig.classList.remove('is-flash');
          }, 1200);
        },
        function () {
          fig.setAttribute('data-done', '复制失败，请手动选择复制');
          fig.classList.add('is-flash');
          window.clearTimeout(fig._copyFlashTimer);
          fig._copyFlashTimer = window.setTimeout(function () {
            fig.classList.remove('is-flash');
            fig.setAttribute('data-done', '已复制到剪贴板');
          }, 2000);
        }
      );
    });
  }

  function init() {
    document.querySelectorAll('figure.highlight').forEach(bind);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
